<!DOCTYPE html>
<html lang="ja">
<head>

  <title>オフライン - AI Usage Monitor</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;

      margin-top: 16px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

<body>
  <div class="card">
    <h1>オフラインです</h1>
    <p>Macとの接続が確認できません。Macが起動していてアプリが動作しているか確認してください。</p>

</html>
